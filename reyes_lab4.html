<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Design</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #c850b0; 
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #040404; 
            text-shadow: 3px 2px #660a60;
            margin-bottom: 30px;
            transform: scale(2.2);
        }

        h2 {
            color: #040404; 
            text-shadow: 3px 2px #660a60;
            margin-bottom: 10px;
            transform: scale(1.2);
        }

        .board-container {
            background-color: #002DFF;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #000000; 
            border: 3px solid #0c4b00; 
            border-radius: 10px;
            transition: transform 0.3s, background-color 0.3s;
        }

        .cell:hover {
            background-color: #f63440; 
            transform: scale(1.1);
            cursor: pointer;
        }

        #reset {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #f63440;
            color: #fff;
            transition: transform 0.1s, background-color 0.1s;
        }

        #reset:hover {
            background-color: #ffcd00;
            color: #0c4b00;
            transform: scale(1.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>
    <h2>1 Player: X</h2>
    <h2>2 Player: O</h2>

    <div class="board-container">
        <div class="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
    </div>

    <button id="reset">Reset</button>

</body>
</html>
