<!DOCTYPE html>
<html>
<head>
    <title>Inventory Table</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: auto;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        th {
            background-color: #89CFF0;         }

        .out {
            color: red;
            font-weight: bold;
        }

        .top-section {
            margin-bottom: 20px;
        }

        input {
            margin: 5px;
        }
    </style>
</head>

<body>

    <h2>Inventory System</h2>

    <div class="top-section">
        <input type="text" id="newItem" placeholder="Item name">
        <input type="number" id="newPrice" placeholder="Price" step="0.01">
        <input type="number" id="newStock" placeholder="Stock">
        <button onclick="addItem()">Add Item</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="inventoryBody">
        </tbody>
    </table>

    <script>

        const tableBody = document.getElementById("inventoryBody");

        let items = [
            { name: "Laptop", price: 30000, stock: 5 },
            { name: "Mouse", price: 500, stock: 10 },
            { name: "Keyboard", price: 1000, stock: 0 },
            { name: "Monitor", price: 8000, stock: 3 },
            { name: "Headset", price: 1500, stock: 7 }
        ];

        function displayItems() {

            tableBody.innerHTML = "";

            for (let i = 0; i < items.length; i++) {

                console.log(i);

                let stockText = items[i].stock == 0 ? "<span class='out'>Out of Stock</span>" : items[i].stock;

                const row = `
                    <tr>
                        <td>${items[i].name}</td>
                        <td>₱${items[i].price.toFixed(2)}</td>
                        <td>${stockText}</td>
                    </tr>
                `;

                tableBody.innerHTML += row;
            }
        }

        function addItem() {

            let name = document.getElementById("newItem").value;
            let price = document.getElementById("newPrice").value;
            let stock = document.getElementById("newStock").value;

            if (name == "" || price == "" || stock == "") {
                alert("Fill all fields");
                return;
            }

            items.push({
                name: name,
                price: Number(price),
                stock: Number(stock)
            });

            displayItems();

            document.getElementById("newItem").value = "";
            document.getElementById("newPrice").value = "";
            document.getElementById("newStock").value = "";
        }

        displayItems();

    </script>

</body>
</html>
