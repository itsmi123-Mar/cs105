<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        th {
            background-color: lightblue; 
        }

        .out {
            color: red;
        }
    </style>
</head>

<body>

    <h2>Inventory System</h2>

    <div>
        <input type="text" id="newItem" placeholder="Item name">
        <input type="number" id="newPrice" placeholder="Price">
        <input type="number" id="newStock" placeholder="Stock">
        <button onclick="addItem()">Add Item</button>
    </div>

    <br>

    <table>
        <tr>
            <th>Item Name</th>
            <th>Price</th>
            <th>Stock</th>
        </tr>
        <tbody id="inventoryBody"></tbody>
    </table>

    <script>

        const body = document.getElementById("inventoryBody");

        let items = [
            {name: "Laptop", price: 30000, stock: 5},
            {name: "Mouse", price: 500, stock: 10},
            {name: "Keyboard", price: 1000, stock: 0},
            {name: "Monitor", price: 8000, stock: 4},
            {name: "Headset", price: 1500, stock: 7}
        ];

        function showItems() {

            body.innerHTML = "";

            for (let i = 0; i < items.length; i++) {

                console.log(i);

                let stockDisplay;

                if (items[i].stock == 0) {
                    stockDisplay = "<span class='out'>Out of Stock</span>";
                } else {
                    stockDisplay = items[i].stock;
                }

                body.innerHTML +=
                "<tr>" +
                "<td>" + items[i].name + "</td>" +
                "<td>₱" + items[i].price.toFixed(2) + "</td>" +
                "<td>" + stockDisplay + "</td>" +
                "</tr>";
            }
        }

        function addItem() {

            let name = document.getElementById("newItem").value;
            let price = document.getElementById("newPrice").value;
            let stock = document.getElementById("newStock").value;

            if (name == "" || price == "" || stock == "") {
                alert("Fill all fields");
                return;
            }

            if (Number(stock) < 0) {
                alert("Negative stock is not allowed");
                return;
            }

            items.push({
                name: name,
                price: Number(price),
                stock: Number(stock)
            });

            showItems();

            document.getElementById("newItem").value = "";
            document.getElementById("newPrice").value = "";
            document.getElementById("newStock").value = "";
        }

        showItems();

    </script>

</body>
</html>
