<!DOCTYPE html>
<html>
<head>
    <title>Diary Entry</title>
</head>
<body>
    <h2>DIARY ENTRY</h2>
    <form>
    
        <label for="name"> Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="date">Date:</label><br>
        <input type="date" id="date" name="date"><br><br>

        <label>AM or PM:</label><br>
        <input type="radio" id="am" name="time" value="AM">
        <label for="am">AM</label>
        <input type="radio" id="pm" name="time" value="PM">
        <label for="pm">PM</label><br><br>

        <label for="mood"> What are you feeling today? </label><br>
        <input type="checkbox">
        <font color="yellow"> HAPPY </font>
        <input type="checkbox">
        <font color="blue"> SAD </font>
        <input type="checkbox">
        <font color="orange"> ANGRY </font>
        <input type="checkbox">
        <font color="green"> EXCITED </font><
        <input type="checkbox">
        <font color="red"> IN LOVE </font>
        <input type="checkbox">
        <font color="pink"> EXHAUSTED </font><br><br>


       <label for="entry"> 
        Entry:</label><br>
        <input type="entry" id="entry" name="entry"><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
